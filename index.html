<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Piccione Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #1a1a2e;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  h1 {
    color: #e0e0e0; letter-spacing: 2px; text-align: center;
    font-size: clamp(0.7em, 3.5vw, 1.4em);
    margin-bottom: clamp(2px, 0.8vw, 8px);
  }
  #hud {
    color: #fff; display: flex; flex-wrap: wrap; justify-content: center;
    gap: clamp(6px, 2.5vw, 40px);
    font-size: clamp(0.58em, 2.6vw, 1em);
    margin-bottom: clamp(2px, 0.8vw, 8px);
  }
  #canvasWrap { position: relative; display: inline-block; line-height: 0; }
  canvas { display: block; border: 2px solid #444; border-radius: 4px; }
  #muteBtn {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.55); border: 1px solid #666;
    border-radius: 5px; color: #fff; font-size: clamp(13px, 3vw, 17px);
    cursor: pointer; padding: 3px 7px; z-index: 10; line-height: 1;
    touch-action: manipulation;
  }
  #muteBtn:hover, #muteBtn:active { background: rgba(0,0,0,0.82); }
  #info {
    color: #aaa; text-align: center; padding: 0 6px;
    font-size: clamp(0.48em, 1.6vw, 0.75em);
    margin-top: clamp(2px, 0.6vw, 6px);
  }
</style>
</head>
<body>
<h1>🐦 PICCIONE SHOOTER 🐦</h1>
<div id="hud">
  <span>PUNTEGGIO: <b id="score">0</b></span>
  <span>VITE: <b id="lives">3</b></span>
  <span>LIVELLO: <b id="level">1</b></span>
  <span>GUANO: <b id="ammo">∞</b></span>
</div>
<div id="canvasWrap">
  <canvas id="c" width="800" height="500"></canvas>
  <button id="muteBtn" onclick="toggleMute()">🔊</button>
</div>
<div id="info">PC: ← → ↑ ↓ | SPAZIO spara | P pausa &nbsp;·&nbsp; Mobile: joystick + SPARA</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let score = 0, lives = 3, level = 1, paused = false, gameOver = false, intro = true;
let keys = {};

const GROUND_Y = H - 100;
const ROAD_Y   = H - 95;

const player = {
  x: W/2, y: 80, w: 54, h: 40,
  speed: 5, wing: 0, wingDir: 1, frame: 0, invincibleTimer: 0
};

let guanos = [], shootCooldown = 0;
const GUANO_SPEED = 9;
let cars = [];
const CAR_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e'];
let particles = [];
let clouds = [
  {x:100,y:30,w:120,s:0.3},{x:350,y:55,w:90,s:0.2},
  {x:600,y:25,w:150,s:0.35},{x:750,y:60,w:80,s:0.25},
];
const trees = [{x:50,h:80},{x:130,h:65},{x:700,h:75},{x:760,h:90},{x:720,h:60}];
let popups = [];

// --- Guardiani ---
let guardians = [], guardianSpawnTimer = 300, waterDrops = [];
let levelUpAnim = null;

// --- Anziana Signora (Nonna) ---
let nonna = null;
let nonnaSpawnTimer = 900 + Math.floor(Math.random()*400);
let breadcrumbs = [];
let escortActive = false, escortTimer = 0;

// --- Super Guano Diarrea ---
let superDiarrea = false, superDiarreaTimer = 0;
const SUPER_DIARREA_DUR = 480; // 8 secondi a ~60fps
let superAutoShootTimer = 0;
let screenFlashR = 0;

// --- Audio ---
const bgMusic = new Audio('park%20theme.mp3');
const guardianMusic = new Audio('guardian%20theme.mp3');
bgMusic.loop = true;       bgMusic.volume = 0.6;
guardianMusic.loop = true; guardianMusic.volume = 0.7;
let muted = false, audioStarted = false, currentTrack = 'park';

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  if (!muted) bgMusic.play().catch(()=>{});
}
function updateMusic() {
  if (!audioStarted) return;
  const want = guardians.length > 0 ? 'guardian' : 'park';
  if (want === currentTrack) return;
  currentTrack = want;
  if (want === 'guardian') { bgMusic.pause(); guardianMusic.currentTime=0; if(!muted) guardianMusic.play().catch(()=>{}); }
  else                     { guardianMusic.pause(); if(!muted) bgMusic.play().catch(()=>{}); }
}
function toggleMute() {
  muted = !muted; bgMusic.muted=muted; guardianMusic.muted=muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
}

function playGuardianSound() {
  try {
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ac.createOscillator(), gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination); osc.type='square';
    osc.frequency.setValueAtTime(880,ac.currentTime);
    osc.frequency.setValueAtTime(660,ac.currentTime+0.12);
    osc.frequency.setValueAtTime(880,ac.currentTime+0.24);
    gain.gain.setValueAtTime(0.12,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.42);
    osc.start(); osc.stop(ac.currentTime+0.42);
  } catch(e){}
}

function playFartSound() {
  if (muted) return;
  try {
    const ac = new(window.AudioContext||window.webkitAudioContext)();
    const o1 = ac.createOscillator(), g1 = ac.createGain();
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o1.connect(g1); o2.connect(g2);
    g1.connect(ac.destination); g2.connect(ac.destination);
    o1.type='sawtooth'; o2.type='square';
    o1.frequency.setValueAtTime(130,ac.currentTime);
    o1.frequency.exponentialRampToValueAtTime(35,ac.currentTime+0.32);
    o2.frequency.setValueAtTime(90,ac.currentTime);
    o2.frequency.exponentialRampToValueAtTime(20,ac.currentTime+0.32);
    g1.gain.setValueAtTime(0.22,ac.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.38);
    g2.gain.setValueAtTime(0.14,ac.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.38);
    o1.start(); o1.stop(ac.currentTime+0.38);
    o2.start(); o2.stop(ac.currentTime+0.38);
  } catch(e){}
}

function playNonnaSound() {
  try {
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ac.createOscillator(), gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination); osc.type='sine';
    osc.frequency.setValueAtTime(440,ac.currentTime);
    osc.frequency.setValueAtTime(550,ac.currentTime+0.1);
    osc.frequency.setValueAtTime(440,ac.currentTime+0.2);
    gain.gain.setValueAtTime(0.10,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35);
    osc.start(); osc.stop(ac.currentTime+0.35);
  } catch(e){}
}

// ---- Canvas scaling ----
let canvasScale = 1;
function resizeCanvas() {
  const h1   = document.querySelector('h1');
  const hud  = document.getElementById('hud');
  const info = document.getElementById('info');
  const usedH = (h1.offsetHeight||26) + (hud.offsetHeight||24) + (info.offsetHeight||18) + 24;
  canvasScale = Math.min(window.innerWidth / W, (window.innerHeight - usedH) / H);
  canvas.style.width  = Math.round(W * canvasScale) + 'px';
  canvas.style.height = Math.round(H * canvasScale) + 'px';
}
window.addEventListener('resize', resizeCanvas);

function toGamePos(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: (clientX - r.left) * (W / r.width), y: (clientY - r.top) * (H / r.height) };
}

// ---- Controlli touch ----
const JOY_CX = 95, JOY_CY = H - 78;
const JOY_R = 72, JOY_KNOB_R = 30;
const FIRE_CX = W - 95, FIRE_CY = H - 78;
const FIRE_R = 62;

let joyTouchId = null, joyKnobX = 0, joyKnobY = 0, joyDx = 0, joyDy = 0;
let fireTouchId = null;

function resetJoystick() { joyTouchId=null; joyKnobX=0; joyKnobY=0; joyDx=0; joyDy=0; }

function updateJoystick(pos) {
  let dx = pos.x - JOY_CX, dy = pos.y - JOY_CY;
  const dist = Math.hypot(dx, dy);
  const maxD = JOY_R - JOY_KNOB_R;
  if (dist > maxD) { dx=dx/dist*maxD; dy=dy/dist*maxD; }
  joyKnobX=dx; joyKnobY=dy; joyDx=dx/maxD; joyDy=dy/maxD;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (intro)    { startGame(); return; }
  if (gameOver) { reset(); return; }
  if (paused)   { paused=false; return; }
  for (const t of e.changedTouches) {
    const pos = toGamePos(t.clientX, t.clientY);
    if (joyTouchId===null && Math.hypot(pos.x-JOY_CX, pos.y-JOY_CY) < JOY_R+30) {
      joyTouchId=t.identifier; updateJoystick(pos);
    } else if (fireTouchId===null && Math.hypot(pos.x-FIRE_CX, pos.y-FIRE_CY) < FIRE_R+30) {
      fireTouchId=t.identifier; shoot();
    }
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===joyTouchId) updateJoystick(toGamePos(t.clientX, t.clientY));
  }
}, {passive:false});

function onTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===joyTouchId) resetJoystick();
    if (t.identifier===fireTouchId) fireTouchId=null;
  }
}
canvas.addEventListener('touchend',   onTouchEnd, {passive:false});
canvas.addEventListener('touchcancel',onTouchEnd, {passive:false});

// ---- Difficoltà ----
function carBaseSpeed() {
  return Math.min((1.0+Math.random()*1.5)*Math.pow(1.15,level-1), 9);
}
function getMaxGuardians()    { return level>=6 ? 2 : 1; }
function getGuardianSpawnInterval() {
  if (level<=2) return 460+Math.floor(Math.random()*80);
  if (level<=4) return 260+Math.floor(Math.random()*60);
  if (level<=7) return 140+Math.floor(Math.random()*50);
  return Math.max(80,110-level*3)+Math.floor(Math.random()*30);
}
function getPumpInterval() {
  if (level<=2) return Math.max(85,105-level*10);
  if (level<=4) return Math.max(42,75-level*8);
  return 0;
}
function getBurstParams() {
  return {
    shots: 3+Math.min(level-5,4),
    shotInterval: Math.max(7,14-level),
    burstPause: Math.max(30,68-level*5),
  };
}

// ---- Guardiani ----
function makeGuardian(leftSide) {
  const gx = leftSide ? 70+Math.random()*90 : W-160+Math.random()*90;
  const burst = level>=5;
  return {
    x:gx, y:GROUND_Y, state:'idle', timer:0, pumpTimer:0,
    pumpInterval:getPumpInterval(), duration:200+Math.random()*80,
    fleeDir:leftSide?-1:1, burst, burstActive:false, burstShotsLeft:0,
    burstDelay:0, burstParams:burst?getBurstParams():null,
    speed: 1.2 + Math.random()*0.6,  // velocità inseguimento orizzontale
    cleanTimer: 0,                    // durata animazione pulizia
  };
}
function spawnGuardian() {
  const leftOccupied = guardians.some(g=>g.x<W/2&&g.state!=='fleeing');
  const leftSide = leftOccupied ? false : (Math.random()<0.5);
  guardians.push(makeGuardian(leftSide));
  playGuardianSound(); updateMusic();
}

function updateGuardianPump(g, tx, ty) {
  if (g.state!=='pumping') return;
  if (g.burst) {
    if (g.burstActive) {
      if (++g.burstDelay>=g.burstParams.shotInterval) {
        g.burstDelay=0; fireWaterJet(g.x,g.y,tx,ty); g.burstShotsLeft--;
        if (g.burstShotsLeft<=0) { g.burstActive=false; g.pumpTimer=0; }
      }
    } else {
      if (++g.pumpTimer>=g.burstParams.burstPause) {
        g.pumpTimer=0; g.burstActive=true;
        g.burstShotsLeft=g.burstParams.shots; g.burstDelay=0;
      }
    }
  } else {
    if (++g.pumpTimer%g.pumpInterval===0) fireWaterJet(g.x,g.y,tx,ty);
  }
}

// tx,ty = posizione piccione (target)
function fireWaterJet(gx, gy, tx, ty) {
  const piAbove = (ty !== undefined) && ty < gy - 50 && Math.abs(tx - gx) < 200;
  for (let i = 0; i < 4; i++) {
    let vx, vy;
    if (piAbove) {
      // Getto diagonale verso il piccione
      const dx = tx - gx, dy = ty - gy;
      const dist = Math.hypot(dx, dy) || 1;
      const spd = 11 + Math.random() * 3;
      vx = (dx / dist) * spd * 0.45 + (Math.random()-0.5) * 1.4;
      vy = (dy / dist) * spd        + (Math.random()-0.5) * 1.4;
    } else {
      // Getto verticale (comportamento originale)
      vx = (Math.random()-0.5)*1.4;
      vy = -(12+Math.random()*4);
    }
    waterDrops.push({ x:gx+(Math.random()-0.5)*10, y:gy-48, vx, vy, r:4+Math.random()*2, life:1 });
  }
}

// ---- Nonna ----
function spawnNonna() {
  const nx = 120 + Math.random() * (W - 240);
  nonna = { x:nx, y:GROUND_Y, timer:0, breadTimer:80, state:'standing' };
  breadcrumbs = [];
  escortActive = true;
  escortTimer = 600; // 10 secondi
  playNonnaSound();
  popups.push({x:nx, y:GROUND_Y-90, text:'👵 ARRIVA LA NONNA!', life:2.5, color:'#FFD700', size:20});
}

function throwBreadcrumb(x, y) {
  for (let i = 0; i < 3; i++) {
    breadcrumbs.push({
      x: x + (Math.random()-0.5)*24,
      y: y - 28,
      vx: (Math.random()-0.5)*2.8,
      vy: -(4 + Math.random()*4),
      r: 4 + Math.random()*3,
      life: 1
    });
  }
}

function updateNonna() {
  if (!nonna) return;
  nonna.timer++;
  if (--nonna.breadTimer <= 0) {
    nonna.breadTimer = 55 + Math.random()*35;
    throwBreadcrumb(nonna.x, nonna.y);
  }
  if (escortActive) {
    escortTimer--;
    if (escortTimer <= 0) {
      escortActive = false;
      nonna = null;
      breadcrumbs = [];
    }
  }
}

function drawNonna(n) {
  if (!n) return;
  ctx.save(); ctx.translate(n.x, n.y);
  const bob = Math.sin(n.timer * 0.08) * 1.8;

  // Ombra
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(0,2,20,5,0,0,Math.PI*2); ctx.fill();

  // Gambe
  ctx.fillStyle='#556677';
  ctx.fillRect(-8,-8+bob,7,14); ctx.fillRect(2,-8+bob,7,14);
  // Scarpe
  ctx.fillStyle='#442200';
  ctx.beginPath(); ctx.ellipse(-5,8+bob,9,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 5,8+bob,9,5,0,0,Math.PI*2); ctx.fill();

  // Corpo (cappotto viola scuro)
  ctx.fillStyle='#664488';
  ctx.beginPath(); ctx.ellipse(0,-26+bob,17,22,0,0,Math.PI*2); ctx.fill();

  // Braccio con borsetta (sinistra)
  ctx.fillStyle='#664488';
  ctx.fillRect(-24,-38+bob,8,20);
  ctx.fillStyle='#aa7733';
  ctx.beginPath(); ctx.roundRect(-32,-28+bob,15,16,3); ctx.fill();
  ctx.strokeStyle='#885522'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-24,-32+bob); ctx.lineTo(-28,-28+bob); ctx.stroke();

  // Braccio che lancia molliche (destra) – si muove
  const throwAng = -0.7 + Math.sin(n.timer*0.12)*0.5;
  ctx.save(); ctx.translate(18,-36+bob); ctx.rotate(throwAng);
  ctx.fillStyle='#664488'; ctx.fillRect(0,0,8,20);
  // Mano
  ctx.fillStyle='#f4c090'; ctx.beginPath(); ctx.arc(4,22,5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Testa
  ctx.fillStyle='#f4c090';
  ctx.beginPath(); ctx.arc(0,-52+bob,13,0,Math.PI*2); ctx.fill();

  // Capelli bianchi
  ctx.fillStyle='#eeeeee';
  ctx.beginPath(); ctx.arc(0,-61+bob,12,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-8,-55+bob,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 8,-55+bob,7,0,Math.PI*2); ctx.fill();

  // Cappello viola con fiore
  ctx.fillStyle='#552299';
  ctx.beginPath(); ctx.ellipse(0,-65+bob,17,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-11,-74+bob,22,11);
  ctx.fillStyle='#ff88bb';
  for (let i=0;i<5;i++){
    const fa=i*Math.PI*2/5;
    ctx.beginPath(); ctx.arc(9+Math.cos(fa)*4,-77+bob+Math.sin(fa)*4,3,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#ffdd00'; ctx.beginPath(); ctx.arc(9,-77+bob,3,0,Math.PI*2); ctx.fill();

  // Occhi e sorriso
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-4,-53+bob,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 4,-53+bob,2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#995533'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-50+bob,5,0.2,Math.PI-0.2); ctx.stroke();

  ctx.restore();
}

function drawBreadcrumbs() {
  for (const b of breadcrumbs) {
    ctx.save(); ctx.globalAlpha=Math.min(1,b.life)*0.92;
    ctx.fillStyle='#c8a060';
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,240,180,0.6)';
    ctx.beginPath(); ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ---- Macchine ----
function spawnCars() {
  cars=[];
  const count=4+level, spacing=(W-100)/count;
  const wildChance=level>=5?Math.min(0.8,(level-4)*0.2):0;
  for (let i=0;i<count;i++) {
    const speed=carBaseSpeed(), dir=Math.random()<0.5?1:-1, isWild=Math.random()<wildChance;
    cars.push({ x:50+i*spacing+Math.random()*20, y:ROAD_Y, w:70+Math.random()*20, h:36,
      color:CAR_COLORS[i%CAR_COLORS.length], vx:speed*dir,
      hit:false, hitTimer:0, shake:0, hp:1+Math.floor(level/3), wild:isWild, wildTimer:60+Math.random()*90 });
  }
}
function spawnParticles(x,y,color) {
  for (let i=0;i<18;i++) {
    const a=Math.random()*Math.PI*2, s=1.5+Math.random()*3;
    particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1,
      life:1, decay:0.04+Math.random()*0.04, r:3+Math.random()*4, color });
  }
}
function shoot() {
  if (shootCooldown>0) return;
  guanos.push({x:player.x,y:player.y+player.h/2,r:7,vy:GUANO_SPEED,splat:false,splatTimer:0,super:false});
  shootCooldown=12;
}

// ---- Draw helpers ----
function drawSky() {
  const g=ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,'#87CEEB'); g.addColorStop(1,'#b0e0ff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND_Y);
}
function drawGround() {
  const g=ctx.createLinearGradient(0,GROUND_Y,0,H);
  g.addColorStop(0,'#5cb85c'); g.addColorStop(0.3,'#4cae4c'); g.addColorStop(1,'#3a8a3a');
  ctx.fillStyle=g; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#555'; ctx.fillRect(0,ROAD_Y-5,W,50);
  ctx.fillStyle='#fff'; ctx.setLineDash([20,20]); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,ROAD_Y+20); ctx.lineTo(W,ROAD_Y+20); ctx.stroke();
  ctx.setLineDash([]);
}
function drawCloud(c) {
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.ellipse(c.x,c.y,c.w*0.5,22,0,0,Math.PI*2);
  ctx.ellipse(c.x-c.w*0.2,c.y+8,c.w*0.3,18,0,0,Math.PI*2);
  ctx.ellipse(c.x+c.w*0.2,c.y+5,c.w*0.35,20,0,0,Math.PI*2);
  ctx.fill();
}
function drawTree(t) {
  ctx.fillStyle='#8B6914'; ctx.fillRect(t.x-5,GROUND_Y-t.h*0.4,10,t.h*0.4);
  ctx.fillStyle='#2d7a2d'; ctx.beginPath(); ctx.arc(t.x,GROUND_Y-t.h*0.4,t.h*0.45,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a963a';
  ctx.beginPath(); ctx.arc(t.x-8,GROUND_Y-t.h*0.55,t.h*0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(t.x+6,GROUND_Y-t.h*0.5,t.h*0.32,0,Math.PI*2); ctx.fill();
}
function drawCar(car) {
  const ox=car.shake?(Math.random()-0.5)*car.shake:0;
  ctx.save(); ctx.translate(ox,0);
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(car.x+car.w/2,car.y+car.h+4,car.w*0.45,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=car.hit?'#fff':car.color;
  ctx.beginPath(); ctx.roundRect(car.x,car.y,car.w,car.h,6); ctx.fill();
  const ri=car.w*0.18;
  ctx.fillStyle=car.hit?'#ccc':shadeColor(car.color,-25);
  ctx.beginPath(); ctx.roundRect(car.x+ri,car.y-car.h*0.5,car.w-ri*2,car.h*0.55,5); ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.7)';
  ctx.fillRect(car.x+ri+3,car.y-car.h*0.48+3,(car.w-ri*2)*0.42,car.h*0.38);
  ctx.fillRect(car.x+ri+(car.w-ri*2)*0.52,car.y-car.h*0.48+3,(car.w-ri*2)*0.42,car.h*0.38);
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(car.x+14,car.y+car.h-1,9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(car.x+car.w-14,car.y+car.h-1,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.arc(car.x+14,car.y+car.h-1,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(car.x+car.w-14,car.y+car.h-1,4,0,Math.PI*2); ctx.fill();
  if (car.splatted) {
    ctx.fillStyle='rgba(255,255,255,0.85)';
    for (const s of car.splats||[]) { ctx.beginPath(); ctx.ellipse(car.x+s.rx*car.w,car.y+s.ry*car.h,s.rw,s.rh,s.rot,0,Math.PI*2); ctx.fill(); }
  }
  if (car.wild&&car.wildTimer<22&&Math.floor(car.wildTimer/4)%2===0) {
    ctx.strokeStyle='#ff3300'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.roundRect(car.x-2,car.y-car.h*0.5-2,car.w+4,car.h*1.5+4,7); ctx.stroke();
  }
  ctx.restore();
}

function drawGuardian(g) {
  if (!g) return;
  ctx.save(); ctx.translate(g.x,g.y);
  const facingLeft = g.state==='fleeing' ? g.fleeDir<0 : g.x>W/2;
  if (facingLeft) ctx.scale(-1,1);

  // Ombra
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(0,2,14,4,0,0,Math.PI*2); ctx.fill();

  // Gambe (con oscillazione in fuga)
  const lo = g.state==='fleeing' ? Math.sin(g.timer*0.28)*6 : 0;
  ctx.fillStyle='#1a5c1a'; ctx.fillRect(-7,-16,5,16-lo); ctx.fillRect(2,-16,5,16+lo);

  // Scarpe
  ctx.fillStyle='#2c1a0e'; ctx.fillRect(-9,-2,8,4); ctx.fillRect(2,-2,8,4);

  // Corpo (uniforme)
  ctx.fillStyle='#2d7a2d'; ctx.fillRect(-9,-34,18,18);
  ctx.fillStyle='#8B6914'; ctx.fillRect(-9,-18,18,3); // cintura
  ctx.fillStyle='#ffd700'; ctx.fillRect(-2,-19,4,5);  // fibbia

  // Braccia
  ctx.fillStyle='#2d7a2d'; ctx.fillRect(-14,-32,5,14); ctx.fillRect(9,-32,5,12);

  // Idrante / pompa (solo se non in pulizia o fuga)
  if (g.state!=='fleeing' && g.state!=='cleaning') {
    const ps=(g.burst&&g.burstActive)?0.38:0.18, pa2=(g.burst&&g.burstActive)?5:3;
    const pa=Math.sin(g.pumpTimer*ps)*pa2;
    ctx.fillStyle='#445566'; ctx.fillRect(10,-36+pa,5,22);
    ctx.fillStyle='#778899'; ctx.fillRect(8,-38+pa,9,4);
    ctx.fillStyle='#556677'; ctx.fillRect(10,-16,5,5); ctx.fillRect(7,-12,10,3);
    if (g.state==='pumping') {
      const glowR=(g.burst&&g.burstActive)?5:3;
      ctx.fillStyle=`rgba(80,160,255,${(g.burst&&g.burstActive)?1:0.9})`;
      ctx.beginPath(); ctx.arc(12,-10+pa*0.4,glowR,0,Math.PI*2); ctx.fill();
      if (g.burst&&g.burstActive) {
        ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle='#88ccff';
        ctx.beginPath(); ctx.arc(12,-10+pa*0.4,10,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
    }
  }

  // Testa
  ctx.fillStyle='#f4c090'; ctx.beginPath(); ctx.arc(0,-42,9,0,Math.PI*2); ctx.fill();

  // Cappello
  ctx.fillStyle='#1a5c1a'; ctx.fillRect(-11,-52,22,5); ctx.fillRect(-8,-61,16,10);
  ctx.fillStyle='#ffd700'; ctx.fillRect(-3,-59,6,5);

  // Occhi e bocca
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-3,-44,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 3,-44,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#555'; ctx.fillRect(-4,-39,8,2);

  // ── Animazione pulizia ──
  if (g.state === 'cleaning') {
    const wipe = Math.sin(g.timer * 0.40) * 7;
    // Braccio alzato che si pulisce la testa
    ctx.fillStyle='#2d7a2d';
    ctx.fillRect(8, -52+wipe, 5, 16);
    ctx.fillStyle='#f4c090';
    ctx.fillRect(10, -54+wipe, 8, 6);
    // Macchia di guano in testa
    ctx.fillStyle='rgba(230,230,200,0.85)';
    ctx.beginPath(); ctx.ellipse(1,-48,9,4,0.2,0,Math.PI*2); ctx.fill();
    // Stelline/esclamativi
    if (Math.floor(g.cleanTimer/6)%2===0) {
      ctx.fillStyle='#FFD700'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
      ctx.fillText('★', 20,-58);
      ctx.fillStyle='#ff4444';
      ctx.fillText('!!', -18,-62);
    }
    // Fumetto "NOOO! LA DIVISA!" sopra la testa (solo nella prima metà)
    if (g.cleanTimer > 50) {
      ctx.save(); ctx.scale(facingLeft?-1:1, 1);
      ctx.fillStyle='#fff'; ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(10,-90,110,26,6); ctx.fill(); ctx.stroke();
      // triangolino fumetto
      ctx.beginPath(); ctx.moveTo(20,-64); ctx.lineTo(14,-60); ctx.lineTo(28,-64); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#ff4400'; ctx.font='bold 10px Courier New'; ctx.textAlign='left';
      ctx.fillText('NOOO! LA DIVISA!', 16,-72);
      ctx.restore();
    }
  }

  ctx.restore();
}

function drawWaterDrops() {
  for (const w of waterDrops) {
    ctx.save(); ctx.globalAlpha=Math.min(1,w.life*6)*0.88;
    ctx.fillStyle='rgba(100,180,255,0.35)';
    ctx.beginPath(); ctx.arc(w.x-w.vx,w.y-w.vy*0.4,w.r*0.65,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5dade2'; ctx.beginPath(); ctx.arc(w.x,w.y,w.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(w.x-w.r*0.3,w.y-w.r*0.3,w.r*0.35,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
function drawPigeon(p) {
  p.frame++; if(p.frame%6===0){p.wing+=p.wingDir*0.4;if(Math.abs(p.wing)>1)p.wingDir*=-1;}
  ctx.save();
  if(p.invincibleTimer>0&&Math.floor(p.invincibleTimer/5)%2===0) ctx.globalAlpha=0.35;
  ctx.translate(p.x,p.y);
  ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.beginPath(); ctx.ellipse(0,p.h*0.6,22,6,0,0,Math.PI*2); ctx.fill();
  const wu=Math.sin(p.frame*0.15)*15; ctx.fillStyle='#8899aa';
  ctx.beginPath(); ctx.ellipse(-p.w*0.45,-5-wu,p.w*0.38,11,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( p.w*0.45,-5-wu,p.w*0.38,11, 0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#778899'; ctx.beginPath(); ctx.ellipse(0,4,p.w*0.32,p.h*0.38,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#667788'; ctx.beginPath(); ctx.arc(p.w*0.28,-6,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(120,200,120,0.4)'; ctx.beginPath(); ctx.ellipse(p.w*0.15,0,10,7,-0.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(p.w*0.38,-8,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(p.w*0.39,-8,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c0a060'; ctx.beginPath();
  ctx.moveTo(p.w*0.52,-7); ctx.lineTo(p.w*0.52+12,-5); ctx.lineTo(p.w*0.52,-3); ctx.fill();
  // Aureola Super Diarrea
  if (superDiarrea) {
    const pulse = 0.5+0.5*Math.sin(Date.now()*0.02);
    ctx.save(); ctx.globalAlpha=0.55*pulse;
    ctx.strokeStyle='#8B4513'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}
function drawGuano(g) {
  const isSuper = !!g.super;
  const baseColor   = isSuper ? '#7a3008' : '#f0f0e0';
  const trailColor  = isSuper ? 'rgba(139,69,19,0.28)' : 'rgba(245,245,245,0.3)';
  const strokeColor = isSuper ? '#5a1e04' : '#ccc';
  if (g.splat) {
    const t=1-g.splatTimer/20; ctx.save(); ctx.globalAlpha=t;
    ctx.fillStyle = isSuper ? '#6b2a06' : '#f5f5f5';
    ctx.beginPath(); ctx.ellipse(g.x,g.y,g.r*2.5*(2-t),g.r*(2-t),0,0,Math.PI*2); ctx.fill();
    for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(g.x+Math.cos(i*1.57)*g.r*3,g.y+Math.sin(i*1.57)*g.r*2,g.r*0.6,0,Math.PI*2);ctx.fill();}
    ctx.restore(); return;
  }
  ctx.fillStyle=trailColor;
  for(let i=1;i<=3;i++){ctx.beginPath();ctx.arc(g.x,g.y-i*10,g.r*(1-i*0.25),0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=baseColor; ctx.strokeStyle=strokeColor; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(g.x,g.y,g.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  if (isSuper) {
    // Alone puzzolente
    ctx.fillStyle='rgba(120,60,10,0.22)';
    ctx.beginPath(); ctx.arc(g.x,g.y,g.r*1.8,0,Math.PI*2); ctx.fill();
  }
}
function drawParticles() {
  for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();}
}
function drawPopups() {
  for(const pop of popups){ctx.save();ctx.globalAlpha=pop.life;ctx.fillStyle=pop.color||'#FFD700';ctx.font=`bold ${pop.size||22}px Courier New`;ctx.textAlign='center';ctx.fillText(pop.text,pop.x,pop.y);ctx.restore();}
}
function drawHitEffect(car) {
  if(!car.hit)return;
  ctx.save();ctx.globalAlpha=car.hitTimer/15*0.4;ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.roundRect(car.x-3,car.y-car.h*0.5-3,car.w+6,car.h*1.5+6,8);ctx.fill();ctx.restore();
}

// ---- Touch controls drawn on canvas ----
function drawArrow(x, y, angle) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(-5,4); ctx.lineTo(5,4); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawTouchControls() {
  if (intro||gameOver) return;
  ctx.save();
  const kx=JOY_CX+joyKnobX, ky=JOY_CY+joyKnobY;
  ctx.globalAlpha=0.14; ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(JOY_CX,JOY_CY,JOY_R,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.3; ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(JOY_CX,JOY_CY,JOY_R,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.12; ctx.beginPath(); ctx.arc(JOY_CX,JOY_CY,18,0,Math.PI*2); ctx.stroke();
  const off=JOY_R-15;
  ctx.globalAlpha=0.42; ctx.fillStyle='#ffffff';
  drawArrow(JOY_CX,JOY_CY-off,0); drawArrow(JOY_CX,JOY_CY+off,Math.PI);
  drawArrow(JOY_CX-off,JOY_CY,-Math.PI/2); drawArrow(JOY_CX+off,JOY_CY,Math.PI/2);
  ctx.globalAlpha=joyTouchId!==null?0.88:0.58;
  const kg=ctx.createRadialGradient(kx-5,ky-5,2,kx,ky,JOY_KNOB_R);
  kg.addColorStop(0,'#c0d8ee'); kg.addColorStop(1,'#2a3a4a');
  ctx.fillStyle=kg; ctx.beginPath(); ctx.arc(kx,ky,JOY_KNOB_R,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(180,215,245,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
  const pressed=fireTouchId!==null, fr=pressed?FIRE_R+5:FIRE_R;
  ctx.globalAlpha=pressed?0.9:0.42;
  const fg=ctx.createRadialGradient(FIRE_CX-14,FIRE_CY-14,4,FIRE_CX,FIRE_CY,fr);
  fg.addColorStop(0,'#ff9999'); fg.addColorStop(1,'#aa1111');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(FIRE_CX,FIRE_CY,fr,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,180,180,0.75)'; ctx.lineWidth=2; ctx.stroke();
  ctx.globalAlpha=pressed?1:0.92; ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.font=`bold ${pressed?18:17}px Courier New`;
  ctx.fillText('SPARA',FIRE_CX,FIRE_CY+7);
  if (paused) {
    ctx.globalAlpha=0.6; ctx.fillStyle='#ffd700';
    ctx.font='bold 14px Courier New'; ctx.fillText('tocca per continuare',W/2,H-12);
  }
  ctx.restore();
}

// ---- Level up ----
const LEVEL_SUBTITLES = {3:'🚗 PIÙ TRAFFICO!',4:'🚗 GUARDIANO PIÙ VELOCE!',5:'💦 RAFFICHE D\'ACQUA!',6:'⚠️ DUE GUARDIANI!'};
function getLevelSubtitle(lv) { return LEVEL_SUBTITLES[lv]||(lv>=7?'😱 CAOS TOTALE!':''); }
function triggerLevelUp()      { levelUpAnim={level,timer:0,maxTimer:145}; }
function drawLevelUp() {
  if (!levelUpAnim) return;
  const t=levelUpAnim.timer/levelUpAnim.maxTimer;
  if (t>1){levelUpAnim=null;return;}
  if (t<0.14){ctx.fillStyle=`rgba(255,255,200,${(1-t/0.14)*0.62})`;ctx.fillRect(0,0,W,H);}
  let scale,alpha;
  if      (t<0.16){scale=0.25+(t/0.16)*1.05;alpha=t/0.16;}
  else if (t<0.72){scale=1.3*(1+Math.sin((t-0.16)*8)*0.04);alpha=1;}
  else            {scale=1.28;alpha=1-(t-0.72)/0.28;}
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(W/2,H/2-18); ctx.scale(scale,scale); ctx.textAlign='center';
  ctx.shadowColor='#c04000'; ctx.shadowBlur=28; ctx.fillStyle='#ffd700';
  ctx.font='bold 68px Courier New'; ctx.fillText('LIVELLO '+levelUpAnim.level+'!',0,0);
  ctx.shadowBlur=0;
  const sub=getLevelSubtitle(levelUpAnim.level);
  if (sub){ctx.fillStyle='#ff6b6b';ctx.font='bold 21px Courier New';ctx.fillText(sub,0,52);}
  ctx.restore();
}

function shadeColor(c,a){
  let r=parseInt(c.slice(1,3),16)+a,g=parseInt(c.slice(3,5),16)+a,b=parseInt(c.slice(5,7),16)+a;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ---- Game loop ----
function update() {
  for(const c of clouds){c.x+=c.s;if(c.x-c.w>W)c.x=-c.w;}
  if(levelUpAnim){levelUpAnim.timer++;if(levelUpAnim.timer>levelUpAnim.maxTimer)levelUpAnim=null;}
  if(intro||paused||gameOver) return;

  // Movimento player
  let dx=0, dy=0;
  if(keys['ArrowLeft'] ||keys['KeyA']) dx-=1;
  if(keys['ArrowRight']||keys['KeyD']) dx+=1;
  if(keys['ArrowUp']   ||keys['KeyW']) dy-=1;
  if(keys['ArrowDown'] ||keys['KeyS']) dy+=1;
  if(Math.abs(joyDx)>0.08) dx+=joyDx;
  if(Math.abs(joyDy)>0.08) dy+=joyDy;
  dx=Math.max(-1,Math.min(1,dx)); dy=Math.max(-1,Math.min(1,dy));
  player.x=Math.max(player.w/2+5, Math.min(W-player.w/2-5, player.x+player.speed*dx));
  player.y=Math.max(30,            Math.min(GROUND_Y-60,    player.y+player.speed*dy));

  if((keys['Space']||keys['KeyZ'])&&shootCooldown<=0) shoot();
  if(shootCooldown>0) shootCooldown--;
  if(player.invincibleTimer>0) player.invincibleTimer--;

  // ── Super Guano Diarrea – sparo automatico ──
  if (superDiarrea) {
    superDiarreaTimer--;
    screenFlashR = 0.18 + 0.10 * Math.sin(superDiarreaTimer * 0.25);
    if (superDiarreaTimer <= 0) { superDiarrea=false; screenFlashR=0; }
    if (++superAutoShootTimer >= 8) {
      superAutoShootTimer = 0;
      guanos.push({x:player.x, y:player.y+player.h/2, r:13, vy:GUANO_SPEED,
                   splat:false, splatTimer:0, super:true});
      playFartSound();
    }
  }

  // Macchine
  for(const car of cars){
    if(car.destroyed)continue;
    car.x+=car.vx;
    if(car.x<=0)      {car.x=0;      car.vx= Math.abs(car.vx);}
    if(car.x+car.w>=W){car.x=W-car.w;car.vx=-Math.abs(car.vx);}
    if(car.wild){
      car.wildTimer--;
      if(car.wildTimer<=0){
        car.vx=(Math.random()<0.5?1:-1)*(Math.abs(car.vx)*(0.8+Math.random()*0.4));
        car.wildTimer=45+Math.random()*75;
      }
    }
  }

  // Guano
  for(const g of guanos){
    if(!g.splat){
      g.y+=g.vy;

      // Collisione guano → NONNA
      if (!g.splat && nonna) {
        if (g.x>nonna.x-25 && g.x<nonna.x+25 && g.y>nonna.y-80 && g.y<nonna.y+10) {
          g.splat=true; g.splatTimer=20;
          lives = Math.max(0, lives-2);
          document.getElementById('lives').textContent=lives;
          spawnParticles(nonna.x, nonna.y-30, '#ffaa00');
          popups.push({x:nonna.x, y:nonna.y-95, text:'HAI COLPITO LA NONNA!', life:3, color:'#FF0000', size:18});
          nonna=null; breadcrumbs=[]; escortActive=false;
          if(lives<=0) gameOver=true;
        }
      }

      // Collisione guano → Guardiano
      if (!g.splat) {
        for(const gi of guardians){
          if(gi.state!=='fleeing'&&gi.state!=='cleaning'
             &&g.x>gi.x-20&&g.x<gi.x+20&&g.y>gi.y-68&&g.y<gi.y){
            g.splat=true; g.splatTimer=20;
            gi.state='cleaning'; gi.cleanTimer=110;
            gi.fleeDir=(gi.x<W/2)?-1:1;
            spawnParticles(gi.x,gi.y-30,'#f0f0e0');
            score+=200; document.getElementById('score').textContent=score; break;
          }
        }
      }

      // Collisione guano → Macchina
      if(!g.splat){
        for(const car of cars){
          if(!car.destroyed&&g.x>car.x&&g.x<car.x+car.w&&g.y+g.r>car.y-car.h*0.5&&g.y-g.r<car.y+car.h){
            g.splat=true;g.splatTimer=20;car.hp--;car.hit=true;car.hitTimer=15;car.shake=5;
            spawnParticles(g.x,g.y,'#f0f0e0');
            const pts=10*level*(g.super?2:1); score+=pts;
            popups.push({x:g.x,y:car.y-30,text:'+'+pts,life:1,color:'#FFD700',size:24});
            if(!car.splats)car.splats=[];
            car.splats.push({rx:(g.x-car.x)/car.w,ry:0.3+Math.random()*0.4,rw:8+Math.random()*8,rh:5+Math.random()*5,rot:Math.random()*Math.PI});
            car.splatted=true;
            if(car.hp<=0){car.destroyed=true;spawnParticles(car.x+car.w/2,car.y,car.color);score+=50*level;
              popups.push({x:car.x+car.w/2,y:car.y-50,text:'DISTRUTTA! '+(50*level),life:1,color:'#FF6B6B',size:20});}
            document.getElementById('score').textContent=score; break;
          }
        }
      }

      // Mancato (a terra)
      if(!g.splat&&g.y>ROAD_Y+20){
        g.splat=true;g.splatTimer=20;lives--;
        document.getElementById('lives').textContent=lives;
        popups.push({x:g.x,y:ROAD_Y-10,text:'MANCATA!',life:1,color:'#e74c3c',size:18});
        if(lives<=0)gameOver=true;
      }
    } else {g.splatTimer--;}
  }
  guanos=guanos.filter(g=>!(g.splat&&g.splatTimer<=0));

  for(const car of cars){
    if(car.hit){car.hitTimer--;if(car.hitTimer<=0){car.hit=false;car.shake=0;}}
    if(car.shake>0)car.shake*=0.8;
  }

  // ── Guardiani – movimento orizzontale + stati ──
  for(const g of guardians){
    g.timer++; g.pumpTimer++;

    if (g.state==='cleaning') {
      // Animazione pulizia → poi fuga
      if (--g.cleanTimer <= 0) g.state='fleeing';

    } else if (g.state==='fleeing') {
      g.x += g.fleeDir * 6;

    } else {
      // Inseguimento orizzontale: piccione o scorta nonna
      const targetX = (escortActive && nonna) ? nonna.x : player.x;
      const ddx = targetX - g.x;
      if (Math.abs(ddx) > 4) {
        g.x = Math.max(40, Math.min(W-40, g.x + Math.sign(ddx) * (g.speed||1.4)));
      }

      if (g.timer > 38) g.state = 'pumping';
      // Non attacca se in modalità scorta
      if (!escortActive) updateGuardianPump(g, player.x, player.y);
      if (g.timer > g.duration) g.state = 'fleeing';
    }
  }
  const prev=guardians.length;
  guardians=guardians.filter(g=>!(g.state==='fleeing'&&(g.x<-90||g.x>W+90)));
  if(guardians.length<prev)updateMusic();

  const maxG=getMaxGuardians();
  if(guardians.length<maxG){
    if(--guardianSpawnTimer<=0){spawnGuardian();guardianSpawnTimer=getGuardianSpawnInterval();}
  }

  // Acqua
  for(const w of waterDrops){
    w.x+=w.vx; w.y+=w.vy; w.vy+=0.12; w.life-=0.007;
    if(player.invincibleTimer<=0){
      if(Math.hypot(w.x-player.x,w.y-player.y)<player.w*0.35+w.r){
        w.life=0;lives--;document.getElementById('lives').textContent=lives;
        player.invincibleTimer=130;
        popups.push({x:player.x,y:player.y-28,text:'BAGNATO!',life:2.5,color:'#3498db',size:30});
        if(lives<=0)gameOver=true;
      }
    }
    if(w.y>H||w.y<-60)w.life=0;
  }
  waterDrops=waterDrops.filter(w=>w.life>0);

  // ── Molliche ──
  for(const b of breadcrumbs){
    b.x+=b.vx; b.y+=b.vy; b.vy+=0.06; b.life-=0.005;
    // Raccolta dal piccione
    if(b.life>0 && Math.hypot(b.x-player.x,b.y-player.y)<player.w*0.42+b.r){
      b.life=0;
      if(!superDiarrea){
        superDiarrea=true; superDiarreaTimer=SUPER_DIARREA_DUR; superAutoShootTimer=0;
        screenFlashR=0.4;
        popups.push({x:player.x,y:player.y-50,text:'💩 SUPER DIARREA ATTIVATA! 💩',life:3,color:'#8B4513',size:19});
        playFartSound();
      }
    }
  }
  breadcrumbs=breadcrumbs.filter(b=>b.life>0&&b.y<H+30);

  // ── Nonna ──
  updateNonna();

  // Spawn nonna (solo se non presente e non in escort)
  if (!nonna && !escortActive) {
    if (--nonnaSpawnTimer <= 0) {
      spawnNonna();
      nonnaSpawnTimer = 700 + Math.floor(Math.random()*500);
    }
  }

  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;}
  particles=particles.filter(p=>p.life>0);
  for(const pop of popups){pop.y-=1.5;pop.life-=0.025;}
  popups=popups.filter(p=>p.life>0);

  if(cars.every(c=>c.destroyed)){
    level++;document.getElementById('level').textContent=level;
    triggerLevelUp();spawnCars();
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  if(intro){drawIntro();return;}
  drawSky(); for(const c of clouds)drawCloud(c); for(const t of trees)drawTree(t);
  drawGround();
  for(const car of cars)if(!car.destroyed){drawHitEffect(car);drawCar(car);}
  for(const g of guardians)drawGuardian(g);
  if(nonna) drawNonna(nonna);
  drawBreadcrumbs();
  drawWaterDrops(); for(const g of guanos)drawGuano(g);
  drawPigeon(player); drawParticles(); drawPopups();

  // Flash marrone Super Diarrea
  if (screenFlashR > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(0.30, screenFlashR);
    ctx.fillStyle = '#6b2a00';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // HUD Super Diarrea
  if (superDiarrea) {
    ctx.save();
    ctx.fillStyle='rgba(90,35,0,0.82)';
    ctx.fillRect(W/2-155, 6, 310, 26);
    ctx.fillStyle='#ffcc44'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';
    const sec = Math.ceil(superDiarreaTimer/60);
    ctx.fillText('💩 SUPER DIARREA: '+sec+'s 💩', W/2, 24);
    ctx.restore();
  }

  // HUD scorta nonna
  if (escortActive && nonna) {
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(W/2-145, H-52, 290, 22);
    ctx.fillStyle='#FFD700'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    const sec2 = Math.ceil(escortTimer/60);
    ctx.fillText('👮 SCORTA NONNA – '+sec2+'s (nessun attacco)', W/2, H-36);
    ctx.restore();
  }

  drawTouchControls();
  drawLevelUp();
  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 48px Courier New';ctx.textAlign='center';ctx.fillText('PAUSA',W/2,H/2);
    ctx.font='20px Courier New';ctx.fillText('Premi P o tocca per continuare',W/2,H/2+40);
  }
  if(gameOver)drawGameOver();
}

function startGame(){intro=false;startAudio();}
function reset(){
  score=0;lives=3;level=1;paused=false;gameOver=false;
  guanos=[];particles=[];popups=[];shootCooldown=0;
  waterDrops=[];guardians=[];guardianSpawnTimer=300;levelUpAnim=null;
  nonna=null; breadcrumbs=[]; escortActive=false; escortTimer=0;
  superDiarrea=false; superDiarreaTimer=0; superAutoShootTimer=0; screenFlashR=0;
  nonnaSpawnTimer=900+Math.floor(Math.random()*400);
  player.x=W/2;player.y=80;player.invincibleTimer=0;
  resetJoystick();fireTouchId=null;
  document.getElementById('score').textContent=0;
  document.getElementById('lives').textContent=3;
  document.getElementById('level').textContent=1;
  currentTrack='park';guardianMusic.pause();
  if(!muted)bgMusic.play().catch(()=>{});
  spawnCars();
}

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space')e.preventDefault();
  if(intro&&(e.code==='Enter'||e.code==='Space')){startGame();return;}
  if(e.code==='KeyP'&&!intro)paused=!paused;
  if(e.code==='Enter'&&gameOver)reset();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

canvas.addEventListener('click',()=>{
  if(intro){startGame();return;}
  if(gameOver){reset();return;}
  if(!paused)shoot();
});

function loop(){update();draw();requestAnimationFrame(loop);}

spawnCars();
resizeCanvas();
loop();
</script>
</body>
